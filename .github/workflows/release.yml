name: 发布流程 (Release Pipeline)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '确认发布当前版本（版本号从 Cargo.toml 读取）'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'

  push:
    tags: ['v*']

jobs:
  # ---------------------------------------------------------------------------
  # 阶段 1: 准备发布（读取版本号 & 打 Tag）
  # ---------------------------------------------------------------------------
  prepare:
    name: 准备发布
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.read_version.outputs.version }}
      tag_name: ${{ steps.read_version.outputs.tag_name }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 读取版本号
        id: read_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION=$(grep '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
            TAG_NAME="v$VERSION"
            echo "Read version from Cargo.toml: $VERSION"

            if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
              echo "Tag $TAG_NAME already exists, skipping tag creation."
              echo "tag_exists=true" >> $GITHUB_OUTPUT
            else
              echo "tag_exists=false" >> $GITHUB_OUTPUT
            fi

            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          else
            TAG_NAME="${{ github.ref_name }}"
            VERSION=${TAG_NAME#v}
            echo "Triggered by tag: $TAG_NAME"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
            echo "tag_exists=true" >> $GITHUB_OUTPUT
          fi

      - name: 创建 Tag (仅手动触发且 Tag 不存在时)
        if: github.event_name == 'workflow_dispatch' && steps.read_version.outputs.tag_exists == 'false'
        run: |
          TAG_NAME="${{ steps.read_version.outputs.tag_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          git push origin "$TAG_NAME"

  # ---------------------------------------------------------------------------
  # 阶段 2: 多平台构建
  # ---------------------------------------------------------------------------
  build:
    name: 构建 (${{ matrix.name }})
    needs: prepare
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            name: macos-aarch64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            name: macos-x86_64
          - platform: ubuntu-22.04
            args: ''
            name: linux-x86_64
          - platform: windows-latest
            args: ''
            name: windows-x86_64

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag_name }}

      - name: 安装 Linux 系统依赖
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf pkg-config \
            libglib2.0-dev libgtk-3-dev libgdk-pixbuf2.0-dev libpango1.0-dev libatk1.0-dev \
            libcairo-gobject2 libjavascriptcoregtk-4.1-dev libasound2-dev libpulse-dev libjack-dev

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: 配置 Rust 缓存
        uses: swatinem/rust-cache@v2

      - name: 安装前端依赖
        run: pnpm install

      - name: 安装 Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: 构建二进制文件
        shell: bash
        run: |
          echo "Building for ${{ matrix.name }}..."
          if [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            cargo tauri build ${{ matrix.args }} --no-bundle
          else
            cargo tauri build --no-bundle
          fi

      - name: 打包产物
        shell: bash
        run: |
          mkdir -p cli-package
          TAG_NAME="${{ needs.prepare.outputs.tag_name }}"

          if [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            if [[ "${{ matrix.args }}" == *"aarch64"* ]]; then
              TARGET_DIR="target/aarch64-apple-darwin/release"
            else
              TARGET_DIR="target/x86_64-apple-darwin/release"
            fi
          else
            TARGET_DIR="target/release"
          fi

          if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            cp "$TARGET_DIR/等一下.exe" cli-package/
            cp "$TARGET_DIR/三术.exe" cli-package/
            cd cli-package
            7z a ../sanshu-cli-${TAG_NAME}-${{ matrix.name }}.zip *
          else
            cp "$TARGET_DIR/等一下" cli-package/
            cp "$TARGET_DIR/三术" cli-package/
            cd cli-package
            tar -czf ../sanshu-cli-${TAG_NAME}-${{ matrix.name }}.tar.gz *
          fi

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: sanshu-cli-${{ matrix.name }}
          path: |
            sanshu-cli-*.tar.gz
            sanshu-cli-*.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 阶段 3: 发布
  # ---------------------------------------------------------------------------
  release:
    name: 发布 Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.tag_name }}

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 安装 git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: 生成 Changelog
        id: changelog
        run: |
          TAG_NAME="${{ needs.prepare.outputs.tag_name }}"
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+' | grep -A 1 "^$TAG_NAME$" | tail -n 1 || echo "")

          if [ -z "$PREVIOUS_TAG" ] || [ "$PREVIOUS_TAG" == "$TAG_NAME" ]; then
            git-cliff --tag "$TAG_NAME" --output changelog.md
          else
            git-cliff "$PREVIOUS_TAG..$TAG_NAME" --output changelog.md
          fi

          VERSION=${TAG_NAME#v}
          if [ -n "$PREVIOUS_TAG" ]; then
            MAIN_FEATURE=$(git log --oneline "$PREVIOUS_TAG..$TAG_NAME" | grep -E "^[a-f0-9]+ (feat|fix)" | head -1 | sed 's/^[a-f0-9]* //' | sed 's/^feat: //' | sed 's/^fix: //')
          fi

          if [ -z "$MAIN_FEATURE" ]; then
             echo "release_title=$VERSION" >> $GITHUB_OUTPUT
          else
             echo "release_title=$VERSION - $MAIN_FEATURE" >> $GITHUB_OUTPUT
          fi

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: ${{ steps.changelog.outputs.release_title }}
          body_path: changelog.md
          draft: false
          prerelease: false
          files: |
            artifacts/*/sanshu-cli-*.tar.gz
            artifacts/*/sanshu-cli-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 触发 Homebrew 更新
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'update-homebrew.yml',
                ref: 'main',
                inputs: { tag_name: '${{ needs.prepare.outputs.tag_name }}' }
              });
            } catch (error) {
              console.error('Could not trigger Homebrew update:', error);
            }
